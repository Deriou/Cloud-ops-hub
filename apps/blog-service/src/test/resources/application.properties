spring.application.name=blog-service-test
spring.threads.virtual.enabled=true
spring.datasource.url=jdbc:h2:mem:blogtest;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
mybatis-plus.configuration.map-underscore-to-camel-case=true
ops.auth.master-key=test-master-key
ops.auth.guest-token-ttl-seconds=300
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
blog.render.cache.maximum-size=64
blog.render.cache.ttl=PT10M
blog.search.mode=h2

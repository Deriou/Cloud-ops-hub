spring.application.name=blog-service
spring.threads.virtual.enabled=true
spring.datasource.url=${BLOG_DATASOURCE_URL:jdbc:mysql://localhost:3306/db_blog?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
spring.datasource.username=${BLOG_DATASOURCE_USERNAME:root}
spring.datasource.password=${BLOG_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
mybatis-plus.configuration.map-underscore-to-camel-case=true
ops.auth.master-key=${OPS_AUTH_MASTER_KEY:}
ops.auth.guest-token-ttl-seconds=300
blog.render.cache.maximum-size=256
blog.render.cache.ttl=PT30M
blog.search.mode=mysql
blog.asset.storage-mode=${BLOG_ASSET_STORAGE_MODE:local}
blog.asset.local-root=${BLOG_ASSET_LOCAL_ROOT:/data/blog-assets}
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=never
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%p service=${spring.application.name} traceId=%X{traceId:-} method=%X{method:-} path=%X{path:-} logger=%logger{36} msg=%msg%n

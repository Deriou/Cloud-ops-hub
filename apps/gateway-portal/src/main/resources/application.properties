spring.application.name=gateway-portal
spring.threads.virtual.enabled=true
ops.auth.master-key=${OPS_AUTH_MASTER_KEY:}
ops.auth.guest-token-ttl-seconds=300
ops.gateway.health.timeout=1500ms
ops.gateway.health.cache-ttl=10s
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=never
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%p service=${spring.application.name} traceId=%X{traceId:-} method=%X{method:-} path=%X{path:-} logger=%logger{36} msg=%msg%n

spring.application.name=gateway-portal
spring.threads.virtual.enabled=true
ops.auth.master-key=${OPS_AUTH_MASTER_KEY:}
ops.auth.guest-token-ttl-seconds=300
ops.gateway.health.timeout=1500ms
ops.gateway.health.cache-ttl=10s
ops.prometheus.base-url=${OPS_PROMETHEUS_BASE_URL:http://prometheus-server.monitoring.svc.cluster.local}
ops.prometheus.timeout=${OPS_PROMETHEUS_TIMEOUT:1500ms}
ops.cluster.name=${OPS_CLUSTER_NAME:k3s-single-node}
ops.cluster.region=${OPS_CLUSTER_REGION:cn-wulanchabu}
ops.cluster.expected-service-count=${OPS_CLUSTER_EXPECTED_SERVICE_COUNT:2}
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=never
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%p service=${spring.application.name} traceId=%X{traceId:-} method=%X{method:-} path=%X{path:-} logger=%logger{36} msg=%msg%n

image:
  registry: crpi-ekwujpeg6f954ar3.cn-wulanchabu.personal.cr.aliyuncs.com
  repository: cloud-ops-hub/grafana-oss
  tag: 12.2.0-amd64
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: acr-secret

replicas: 1

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  ingressClassName: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
  hosts:
    - grafana.deriou.com
  path: /
  pathType: Prefix

persistence:
  enabled: false

initChownData:
  enabled: false

downloadDashboardsImage:
  registry: crpi-ekwujpeg6f954ar3.cn-wulanchabu.personal.cr.aliyuncs.com
  repository: cloud-ops-hub/curl
  tag: 8.9.1-amd64
  pullPolicy: IfNotPresent

admin:
  existingSecret: grafana-admin-secret
  userKey: admin-user
  passwordKey: admin-password

envFromSecret: grafana-alerting-secret

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 768Mi

grafana.ini:
  server:
    domain: grafana.deriou.com
    root_url: http://grafana.deriou.com/
  auth.anonymous:
    enabled: true
    org_role: Viewer
  users:
    viewers_can_edit: false
    default_theme: light
  dashboards:
    default_home_dashboard_path: /var/lib/grafana/dashboards/default/cloud-ops-overview.json
  date_formats:
    default_timezone: Asia/Shanghai
  analytics:
    reporting_enabled: false
    check_for_updates: false

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-server.monitoring.svc.cluster.local
        isDefault: true
        editable: false
        jsonData:
          timeInterval: 30s
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki-gateway.monitoring.svc.cluster.local
        editable: false
        jsonData:
          maxLines: 1000

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: Cloud Ops
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

dashboards: {}

sidecar:
  dashboards:
    enabled: false
  datasources:
    enabled: false
  plugins:
    enabled: false
  alerts:
    enabled: false

testFramework:
  enabled: false

imageRenderer:
  enabled: false

alerting:
  templates.yaml:
    apiVersion: 1
    templates:
      - orgId: 1
        name: feishu.cloud_ops
        template: |
          {{ "{{ define \"feishu.cloud_ops_payload\" -}}" }}
          {{ "{{- $stateText := \"告警\" -}}" }}
          {{ "{{- if eq .Status \"resolved\" }}{{- $stateText = \"恢复\" -}}{{- end -}}" }}
          {{ "{{- $text := printf \"Cloud-Ops-Hub %s\\n状态：%s\\n规则：%s\\n服务：%s\\n命名空间：%s\\n级别：%s\\n说明：Prometheus 无法正常抓取业务服务，请检查 Pod、Service、/actuator/prometheus。\\nGrafana：http://grafana.deriou.com\" $stateText .Status .CommonLabels.alertname .CommonLabels.service .CommonLabels.namespace .CommonLabels.severity -}}" }}
          {{ "{{ coll.Dict \"msg_type\" \"text\" \"content\" (coll.Dict \"text\" $text) | data.ToJSON }}" }}
          {{ "{{- end }}" }}

  contactpoints.yaml:
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: feishu-cloud-ops
        receivers:
          - uid: feishu-cloud-ops-webhook
            type: webhook
            disableResolveMessage: false
            settings:
              url: $FEISHU_WEBHOOK_URL
              httpMethod: POST
              payload: |
                {{ "{{ template \"feishu.cloud_ops_payload\" . }}" }}

  policies.yaml:
    apiVersion: 1
    policies:
      - orgId: 1
        receiver: feishu-cloud-ops
        group_by:
          - grafana_folder
          - alertname
          - service
        group_wait: 10s
        group_interval: 30s
        repeat_interval: 5m
        routes:
          - receiver: feishu-cloud-ops
            matchers:
              - alertname = CloudOpsServiceDown

  rules.yaml:
    apiVersion: 1
    groups:
      - orgId: 1
        name: service-availability
        folder: Cloud Ops
        interval: 30s
        rules:
          - uid: cloudops-service-down
            title: CloudOpsServiceDown
            condition: C
            data:
              - refId: A
                datasourceUid: prometheus
                relativeTimeRange:
                  from: 300
                  to: 0
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  editorMode: code
                  expr: up{namespace="cloud-ops", service=~"gateway-portal|blog-service"}
                  instant: true
                  intervalMs: 1000
                  legendFormat: '{{ "{{service}}" }}'
                  maxDataPoints: 43200
                  range: false
                  refId: A
              - refId: B
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  conditions:
                    - evaluator:
                        params: []
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                          - B
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  intervalMs: 1000
                  maxDataPoints: 43200
                  reducer: last
                  refId: B
                  type: reduce
              - refId: C
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 1
                        type: lt
                      operator:
                        type: and
                      query:
                        params:
                          - C
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: B
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: C
                  type: threshold
            noDataState: NoData
            execErrState: Error
            for: 1m
            annotations:
              summary: Cloud-Ops-Hub service is down
              description: 'Prometheus cannot scrape {{ "{{ $labels.service }}" }} in cloud-ops namespace.'
              runbook_url: http://grafana.deriou.com/d/cloud-ops-overview/cloud-ops-overview
            labels:
              severity: critical
              category: availability
              namespace: cloud-ops
            isPaused: false

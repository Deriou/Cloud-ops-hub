server:
  persistentVolume:
    enabled: false
  retention: "3d"
  service:
    type: ClusterIP

alertmanager:
  enabled: false

prometheus-pushgateway:
  enabled: false

kube-state-metrics:
  enabled: false

prometheus-node-exporter:
  enabled: false

serverFiles:
  prometheus.yml:
    scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets:
              - "localhost:9090"

      - job_name: "cloud-ops-gateway-portal"
        metrics_path: "/actuator/prometheus"
        scrape_interval: 30s
        static_configs:
          - targets:
              - "gateway-portal.cloud-ops.svc.cluster.local:8080"
            labels:
              namespace: "cloud-ops"
              service: "gateway-portal"

      - job_name: "cloud-ops-blog-service"
        metrics_path: "/actuator/prometheus"
        scrape_interval: 30s
        static_configs:
          - targets:
              - "blog-service.cloud-ops.svc.cluster.local:8080"
            labels:
              namespace: "cloud-ops"
              service: "blog-service"

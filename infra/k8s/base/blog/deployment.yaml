apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-service
  namespace: cloud-ops
  labels:
    app: blog-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blog-service
  template:
    metadata:
      labels:
        app: blog-service
    spec:
      imagePullSecrets:
        - name: acr-secret
      volumes:
        - name: blog-assets
          persistentVolumeClaim:
            claimName: blog-assets-pvc
      containers:
        - name: blog-service
          image: crpi-ekwujpeg6f954ar3.cn-wulanchabu.personal.cr.aliyuncs.com/cloud-ops-hub/blog-service:0.0.5-plg-v1
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: blog-config
          env:
            - name: BLOG_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloud-ops-secret
                  key: BLOG_DATASOURCE_PASSWORD
            - name: OPS_AUTH_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: cloud-ops-secret
                  key: OPS_AUTH_MASTER_KEY
          volumeMounts:
            - name: blog-assets
              mountPath: /data/blog-assets
          resources:
            requests:
              cpu: 100m
              memory: 300Mi
            limits:
              cpu: 500m
              memory: 768Mi
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: cloud-ops
data:
  # Matches apps/gateway-portal/src/main/resources/application.properties
  OPS_GATEWAY_HEALTH_TIMEOUT: "1500ms"
  OPS_GATEWAY_HEALTH_CACHE_TTL: "10s"
